name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install scanner
        run: pip install bandit==1.7.9
      - name: Run SAST
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -ll -ii || true
      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: bandit-report.json

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Run pip-audit
        run: |
          pip-audit -r src/requirements.txt --format json --output pip-audit-report.json || true
          pip-audit -r src/requirements.txt || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: pip-audit-report.json

  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  container-scan:
    name: Container Image Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t devsecops-app:${{ github.sha }} . || echo "No Dockerfile found, skipping build"
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "devsecops-app:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true
      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, dependency-check, secret-detection]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: pip install bandit==1.7.9 pip-audit==2.7.3 detect-secrets==1.5.0 click==8.1.7 python-dotenv==1.0.1 tabulate==0.9.0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
      - name: Run full scan and generate unified report
        run: |
          python src/scanner.py scan-all \
            --target src/ \
            --requirements src/requirements.txt \
            --output security-report.json \
            --no-fail-on-high
      - name: Upload unified report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json
      - name: Print summary
        run: |
          echo "=== Security Scan Summary ==="
          python -c "
          import json, sys
          with open('security-report.json') as f:
              r = json.load(f)
          s = r.get('summary', {})
          print(f'Blocking issues: {s.get(\"blocking_issues\", 0)}')
          print(f'Overall pass: {s.get(\"pass\", False)}')
          "
